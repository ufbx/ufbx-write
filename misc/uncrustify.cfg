
newlines = auto
input_tab_size = 4
output_tab_size = 4

disable_processing_cmt = " ufbxwi_disable_format"
enable_processing_cmt = " ufbxwi_enable_format"

code_width = 0
ls_code_width = false
ls_for_split_full = false
ls_func_split_full = false

indent_columns = 4
indent_align_paren = false
indent_func_call_param = true

# 1: use tabs for structural indentation and spaces for alignment.
indent_with_tabs = 1

# Preserve existing alignment whitespace where possible.
align_keep_tabs = true
align_keep_extra_space = true
align_with_tabs = false

disable_processing_nl_cont = true
pp_ignore_define_body = true

pp_indent = ignore

sp_before_ptr_star = add
sp_before_ptr_star_func = add
sp_after_ptr_star = remove
sp_between_ptr_star = remove

sp_before_unnamed_ptr_star = remove
sp_before_qualifier_ptr_star = add
sp_after_cast = remove
sp_inside_paren_cast = remove

nl_func_leave_one_liners = true

sp_before_sparen = add
sp_inside_sparen = remove
sp_inside_for = remove
sp_sparen_brace = add
sp_brace_close_while = add

sp_func_proto_paren = remove
sp_func_def_paren = remove
sp_func_call_paren = remove
sp_inside_fparen = remove
sp_inside_fparens = remove

sp_after_comma = add
sp_before_comma = remove
sp_before_semi = remove
sp_after_semi = add
